<span>
    {{ range .Site.Params.hero.socialLinks.fontAwesomeIcons }}
    <span class="profile-social-item">
        <a href="{{ .url }}" target="_blank" class="profile-social-link">
            <i class="{{ .icon }}"></i>
        </a>
    </span>
    {{ end }}

    {{ range .Site.Params.hero.socialLinks.customIcons }}
    <span class="profile-social-item">
        <a href="{{ .url }}" target="_blank" class="profile-social-link">
            <img src="{{ .icon }}">
        </a>
    </span>
    {{ end }}
</span>
